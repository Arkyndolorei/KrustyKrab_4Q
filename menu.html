<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Krusty Krab</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Slackey&display=swap');

body {
    background-image: url('https://static.wikia.nocookie.net/spongebob/images/b/b6/Krusty_Krab_Interior.png/revision/latest?cb=20230612105716');
    background-size: cover;
    background-position: center;
    font-family: "Slackey", sans-serif;
    margin: 0;
    min-height: 100vh;
    background-attachment: fixed;
}
</style>

</head>

<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="menu.html">Menu</a>
    <a href="#order">Order Now!</a>
</div>

<div class="logo1">
    <img src="https://static.wikia.nocookie.net/logopedia/images/8/8a/KK_main_logo.png/revision/latest?cb=20250125082603">
</div>

<div class="logo">
    <img src="https://static.wikia.nocookie.net/logopedia/images/8/8a/KK_main_logo.png/revision/latest?cb=20250125082603">
</div>

<h1 class="title">Hey sailor, welcome!!!!!</h1>
<p class="subtitle">🫧 We had 20% discount by the way</p>

<div class="krustylist">
    <div class="krustyitem">
        <img src="https://static.wikia.nocookie.net/heroism/images/f/fa/Krabby_Patty.jpg">
        <h3>Krabby Patty - $1.25</h3>
        <button onclick="addToCart('Krabby Patty', 1.25)">Add to Cart</button>
    </div>
</div>

<section class="cart-section" id="order">

    <div class="cart-header">
        <h2>🛒 Your Order</h2>
    </div>

    <div class="cart-content">
        <ul id="cartList" class="cart-list"></ul>
        <div class="cart-empty" id="emptyMsg">Hmmm nothing? That's boring... 🦦</div>

        <div class="cart-total">
            <span>Total:</span>
            <span>$<span id="total">0.00</span></span>
        </div>
    </div>

    <form id="checkoutForm"
          action="http://52.74.133.173/cs3/checkout.php"
          method="GET"
          onsubmit="return prepareOrder()">

<input type="text" name="cust_name" placeholder="Your Name" required>
 <input type="email" name="cust_email" placeholder="Email Address" required>
 <input type="text" name="cust_addr" placeholder="Delivery Address" required>

 <input type="hidden" name="cust_order" id="cust_order">

<button type="submit">Place Order</button>
</form>

</section>

<script>
let cart = [];

function addToCart(name, price) {
    cart.push({ prod_name: name, prod_price: price });
    displayCart();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    displayCart();
}

function displayCart() {
    const list = document.getElementById("cartList");
    const totalEl = document.getElementById("total");
    const emptyMsg = document.getElementById("emptyMsg");

    list.innerHTML = "";

    emptyMsg.style.display = cart.length === 0 ? "block" : "none";

    cart.forEach((item, index) => {
        let li = document.createElement("li");
        li.innerHTML = `
            ${item.prod_name} - $${item.prod_price.toFixed(2)}
            <button onclick="removeFromCart(${index})">Remove</button>
        `;
        list.appendChild(li);
    });

    let total = cart.reduce((sum, item) => sum + item.prod_price, 0);
    totalEl.textContent = total.toFixed(2);
}

function prepareOrder() {
    if (cart.length === 0) {
        alert("Your cart is empty!");
        return false;
    }

    const orderData = encodeURIComponent(JSON.stringify(cart));
    document.getElementById("cust_order").value = orderData;

    return true;
}

displayCart();
</script>

</body>
</html>
