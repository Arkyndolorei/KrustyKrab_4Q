  <style>
body{
    background-image: url('https://static.wikia.nocookie.net/spongebob/images/b/b1/SpongeChovy_065.png/revision/latest?cb=20231123061928');

    background-position: center;
    height: 1350px;

} 
body {
    margin: 0;
    padding:0;
    font-family:"DynaPuff","consolas", sans-serif;
}

.navbar {
    background-color: rgb(31, 184, 255);

    padding: 25px;

    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    list-style-type: none;
    box-shadow: 0px 0px 10px black;
    overflow: hidden;
}

.navbar a {
    color: rgb(255, 236, 66);
    text-decoration: none;
    padding: 15px;
    display: block;
    font-weight: bold;
    font-size:30px ;
    text-align: center;
    text-shadow: 0px 0px 10px black;
}
.navbar a:hover{
    background-color: rgb(10, 138, 197);
        
}

.logo {
    position: absolute;
    height: 150px;
    top: 0;
    left: 20px;
}

.logo img {
    height: 250px;
  width: 200px;
}
main{
    margin-left: 20px;
    margin-right: 20px;
}
img {
  display: block;
  margin: auto;
  width: 80%;
}
    .menu-button-container {
    text-align: center;
}

.menu-button {
    background-color: rgb(255, 236, 66);
    color: black;
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 10px;
    font-weight: bold;
    box-shadow: 0px 0px 10px black;
}

<main>
<img src="https://github.com/Arkyndolorei/Arkyndolorei/blob/main/Untitled%20design.png?raw=true" alt="Krusty Krab Logo">
